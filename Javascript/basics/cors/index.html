<body>
    <!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
</head>
<body>

<button onclick="sendRequest()">Send Request</button>

<script>
    async function sendRequest() {

        const response = await fetch("http://localhost:3000", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            }
        });

        const data = await response.json();

        console.log(data);
    }
</script>

</body>
</html>
</body>
